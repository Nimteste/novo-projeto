<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="g1" x1="0" x2="1">
      <stop offset="0" stop-color="#00e0ff" />
      <stop offset="1" stop-color="#ff6ec7" />
    </linearGradient>
    <filter id="grain"><feTurbulence baseFrequency="0.8" numOctaves="1" stitchTiles="stitch" result="t"/><feColorMatrix type="saturate" values="0" in="t" result="g"/><feBlend in="SourceGraphic" in2="g" mode="overlay"/></filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#g1)" />
  <g fill="#ffffff" fill-opacity="0.06">
    <rect x="0" y="0" width="1200" height="800" filter="url(#grain)" />
  </g>
  <g font-family="Segoe UI, Roboto, Arial, sans-serif" text-anchor="middle" transform="translate(600,420)">
    <text x="0" y="-10" font-size="52" font-weight="700" fill="#fff">Projeto 1</text>
    <text x="0" y="50" font-size="22" fill="#f0f8ff">Site Institucional — responsivo e moderno</text>
  </g>
</svg>